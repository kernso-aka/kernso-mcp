steps:
  # Step 1: Generate pip credentials for Artifact Registry
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud auth print-access-token > /workspace/.ar_token
        echo "[global]" > /workspace/pip.conf
        printf "extra-index-url = https://oauth2accesstoken:" >> /workspace/pip.conf
        cat /workspace/.ar_token | tr -d '\n' >> /workspace/pip.conf
        echo "@us-east1-python.pkg.dev/kernso-reddit-data-1/kernso-python/simple/" >> /workspace/pip.conf
        rm /workspace/.ar_token

  # Step 2: Build Docker image with pip.conf
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/kernso-repo/kernso-mcp:0.1.0'
      - '-t'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/kernso-repo/kernso-mcp:latest'
      - '.'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/kernso-repo/kernso-mcp:0.1.0'
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/kernso-repo/kernso-mcp:latest'
